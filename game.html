<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>game | あの頃日和</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf9f7; --bg-card: #ffffff; --bg-sub: #f4f3f0;
      --text: #1a1a18; --text-sub: #6b6b66; --text-hint: #a8a8a2;
      --border: rgba(0,0,0,0.10); --border-md: rgba(0,0,0,0.16);
      --radius-lg: 16px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Serif JP', serif; min-height: 100vh; }

    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.4rem 1.5rem; border-bottom: 0.5px solid var(--border);
      max-width: 760px; margin: 0 auto;
    }
    .logo { font-size: 14px; letter-spacing: 0.15em; color: var(--text); text-decoration: none; }
    .nav-back { font-size: 12px; letter-spacing: 0.08em; color: var(--text-hint); text-decoration: none; }
    .nav-back:hover { color: var(--text-sub); }

    .page-header {
      max-width: 680px; margin: 0 auto;
      padding: 3rem 1.5rem 2rem; text-align: center;
      border-bottom: 0.5px solid var(--border);
    }
    .page-label { font-size: 10px; letter-spacing: 0.28em; color: var(--text-hint); text-transform: uppercase; margin-bottom: 0.8rem; }
    .page-title { font-size: 22px; font-weight: 300; letter-spacing: 0.14em; margin-bottom: 0.6rem; }
    .page-desc { font-size: 12px; color: var(--text-sub); line-height: 2.2; letter-spacing: 0.05em; }

    .game-wrap {
      max-width: 680px; margin: 2.5rem auto; padding: 0 1.5rem 3rem;
    }

    .game-card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .game-title-bar {
      padding: 1rem 1.4rem;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .game-name { font-size: 14px; font-weight: 500; letter-spacing: 0.05em; }
    .game-tag {
      font-size: 10px; letter-spacing: 0.08em;
      background: var(--bg-sub); border-radius: 100px;
      padding: 3px 10px; color: var(--text-hint);
    }

    .game-frame-wrap {
      position: relative;
      width: 100%;
      height: 500px;
      background: var(--bg-sub);
    }

    .game-frame-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* iframeが読み込めない時のフォールバック */
    .fallback {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
    }
    .fallback-text {
      font-size: 13px; color: var(--text-sub);
      line-height: 2.2; letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
    }

    .btn-open {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-family: 'Noto Serif JP', serif;
      font-size: 13px; letter-spacing: 0.1em;
      padding: 0.8rem 2rem;
      background: var(--text); color: #fff;
      border: none; border-radius: 100px;
      text-decoration: none; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-open:hover { background: #333; }

    .game-note {
      font-size: 11px; color: var(--text-hint);
      text-align: center; letter-spacing: 0.05em;
      line-height: 2; margin-top: 0.8rem;
    }

    footer {
      padding: 1.8rem 0; text-align: center;
      font-size: 10px; letter-spacing: 0.12em; color: var(--text-hint);
      border-top: 0.5px solid var(--border);
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">あの頃日和</a>
  <a href="index.html" class="nav-back">← トップに戻る</a>
</nav>

<div class="page-header">
  <div class="page-label">game</div>
  <div class="page-title">あそぶ</div>
  <div class="page-desc">ちょっと休憩、ゲームでもどうぞ。</div>
</div>

<div class="game-wrap">

  <div class="game-card">
    <div class="game-title-bar">
      <span class="game-name">ちいかわジャンプ</span>
      <span class="game-tag">ジャンプゲーム</span>
    </div>

    <div class="game-frame-wrap">
      <iframe
        id="gameFrame"
        src="https://cdn.fbsbx.com/v/t65.102178-21/712843074_1452884039945666_6509048391411764589_n.jpg/chiikawa-jump_web_artifact_1_5b3cc981aa26.html?_nc_ht=cdn.fbsbx.com&_nc_ohc=7lYNrnreA1EQ7kNvwFCdbzz&sdl=0&ccb=14-4&oh=00_Af_Jpc9kObGoS8yI-pFHlszBYsYZnDzSvhP4bUgy8wAMgQ&oe=6A217072&_nc_sid=4ee932&utm_source=meta_ai_web_share_copy_link&utm_medium=share&utm_campaign=ecto_share"
        allowfullscreen
        loading="lazy">
      </iframe>

      <!-- 読み込めない場合 -->
      <div class="fallback" id="fallback">
        <div class="fallback-text">
          ゲームを別タブで開いてください。
        </div>
        <a href="https://cdn.fbsbx.com/v/t65.102178-21/712843074_1452884039945666_6509048391411764589_n.jpg/chiikawa-jump_web_artifact_1_5b3cc981aa26.html?_nc_ht=cdn.fbsbx.com&_nc_ohc=7lYNrnreA1EQ7kNvwFCdbzz&sdl=0&ccb=14-4&oh=00_Af_Jpc9kObGoS8yI-pFHlszBYsYZnDzSvhP4bUgy8wAMgQ&oe=6A217072&_nc_sid=4ee932&utm_source=meta_ai_web_share_copy_link&utm_medium=share&utm_campaign=ecto_share"
           target="_blank" class="btn-open">ゲームを開く →</a>
      </div>
    </div>
  </div>

  <p class="game-note">※ うまく表示されない場合は「ゲームを開く」ボタンから別タブで遊べます</p>

</div>

<footer>© 2025 Rick · あの頃日和</footer>

<script>
  // iframeが読み込めない場合はボタンを表示
  const frame = document.getElementById('gameFrame');
  frame.addEventListener('error', () => {
    frame.style.display = 'none';
    document.getElementById('fallback').style.display = 'block';
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contact | あの頃日和</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf9f7; --bg-card: #ffffff; --bg-sub: #f4f3f0;
      --text: #1a1a18; --text-sub: #6b6b66; --text-hint: #a8a8a2;
      --border: rgba(0,0,0,0.10); --border-md: rgba(0,0,0,0.16);
      --radius-lg: 16px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Serif JP', serif; min-height: 100vh; }

    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.4rem 1.5rem; border-bottom: 0.5px solid var(--border);
      max-width: 760px; margin: 0 auto;
    }
    .logo { font-size: 14px; letter-spacing: 0.15em; color: var(--text); text-decoration: none; }
    .nav-back { font-size: 12px; letter-spacing: 0.08em; color: var(--text-hint); text-decoration: none; }
    .nav-back:hover { color: var(--text-sub); }

    .page-header {
      max-width: 680px; margin: 0 auto;
      padding: 3rem 1.5rem 2rem; text-align: center;
      border-bottom: 0.5px solid var(--border);
    }
    .page-label { font-size: 10px; letter-spacing: 0.28em; color: var(--text-hint); text-transform: uppercase; margin-bottom: 0.8rem; }
    .page-title { font-size: 22px; font-weight: 300; letter-spacing: 0.14em; margin-bottom: 0.6rem; }
    .page-desc { font-size: 12px; color: var(--text-sub); line-height: 2.2; letter-spacing: 0.05em; }

    .form-wrap {
      max-width: 560px; margin: 3rem auto; padding: 0 1.5rem 3rem;
    }

    .form-group { margin-bottom: 1.6rem; }
    label {
      display: block; font-size: 11px; letter-spacing: 0.14em;
      color: var(--text-sub); margin-bottom: 0.6rem;
    }
    input, textarea, select {
      width: 100%; font-family: 'Noto Serif JP', serif;
      font-size: 14px; color: var(--text);
      background: var(--bg-card); border: 0.5px solid var(--border);
      border-radius: 10px; padding: 0.85rem 1rem;
      outline: none; transition: border-color 0.2s;
      letter-spacing: 0.04em;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--border-md); }
    textarea { resize: vertical; min-height: 160px; line-height: 1.9; }

    .btn-submit {
      width: 100%; font-family: 'Noto Serif JP', serif;
      font-size: 13px; letter-spacing: 0.12em;
      padding: 1rem; background: var(--text); color: #fff;
      border: none; border-radius: 100px; cursor: pointer;
      transition: background 0.2s; margin-top: 0.5rem;
    }
    .btn-submit:hover { background: #333; }

    .note {
      font-size: 11px; color: var(--text-hint); text-align: center;
      margin-top: 1.2rem; line-height: 2; letter-spacing: 0.05em;
    }

    /* 送信完了メッセージ（Netlifyが ?submitted=true でリダイレクトした時） */
    .success-msg {
      display: none; text-align: center; padding: 3rem 1rem;
      background: var(--bg-card); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); margin: 2rem 1.5rem;
    }
    .success-msg.show { display: block; }
    .success-icon { font-size: 32px; margin-bottom: 1rem; }
    .success-title { font-size: 16px; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
    .success-text { font-size: 12px; color: var(--text-sub); line-height: 2; }

    footer {
      padding: 1.8rem 0; text-align: center;
      font-size: 10px; letter-spacing: 0.12em; color: var(--text-hint);
      border-top: 0.5px solid var(--border);
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">あの頃日和</a>
  <a href="index.html" class="nav-back">← トップに戻る</a>
</nav>

<div class="page-header">
  <div class="page-label">contact</div>
  <div class="page-title">お問い合わせ</div>
  <div class="page-desc">
    感想・お仕事のご依頼など、<br>お気軽にご連絡ください。
  </div>
</div>

<!-- 送信完了メッセージ -->
<div class="success-msg" id="successMsg">
  <div class="success-icon">✉</div>
  <div class="success-title">送信しました</div>
  <div class="success-text">お問い合わせありがとうございます。<br>数日以内にご返信いたします。</div>
</div>

<div class="form-wrap" id="formWrap">
  <!--
    netlify 属性を付けるだけでNetlifyがフォームを受け取ってくれます。
    action="/contact.html?submitted=true" で送信後に完了メッセージを表示します。
  -->
  <form name="contact" method="POST" data-netlify="true" action="/contact.html?submitted=true">
    <input type="hidden" name="form-name" value="contact">

    <div class="form-group">
      <label for="name">お名前</label>
      <input type="text" id="name" name="name" placeholder="山田 太郎" required>
    </div>

    <div class="form-group">
      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" placeholder="example@email.com" required>
    </div>

    <div class="form-group">
      <label for="subject">件名</label>
      <select id="subject" name="subject">
        <option value="感想">感想</option>
        <option value="お仕事のご依頼">お仕事のご依頼</option>
        <option value="その他">その他</option>
      </select>
    </div>

    <div class="form-group">
      <label for="message">メッセージ</label>
      <textarea id="message" name="message" placeholder="メッセージをご記入ください" required></textarea>
    </div>

    <button type="submit" class="btn-submit">送信する</button>
    <p class="note">通常2〜3日以内にご返信いたします</p>
  </form>
</div>

<footer>© 2025 Rick · あの頃日和</footer>

<script>
  // URLに ?submitted=true がついていたら完了メッセージを表示
  if (window.location.search.includes('submitted=true')) {
    document.getElementById('successMsg').classList.add('show');
    document.getElementById('formWrap').style.display = 'none';
  }
</script>

</body>
</html>
